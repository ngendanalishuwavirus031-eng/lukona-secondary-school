function StatusPill({ status }) {
  const map = {
    Pending: "bg-amber-50 text-amber-700 border-amber-200",
    Submitted: "bg-blue-50 text-blue-700 border-blue-200",
    Graded: "bg-emerald-50 text-emerald-700 border-emerald-200",
    Active: "bg-emerald-50 text-emerald-700 border-emerald-200",
    "Pending Registration": "bg-amber-50 text-amber-700 border-amber-200",
  };
  return (
    <span className={`text-xs font-semibold px-2.5 py-1 rounded-full border ${map[status] || "bg-slate-50 text-slate-600 border-slate-200"}`}>
      {status}
    </span>
  );
}

function Bar({ label, value, max, tint }) {
  const pct = max > 0 ? Math.round((value / max) * 100) : 0;
  return (
    <div>
      <div className="flex items-center justify-between text-xs mb-1">
        <span className="text-slate-600">{label}</span>
        <span className="text-slate-400">{value}</span>
      </div>
      <div className="w-full h-2 rounded-full bg-slate-100 overflow-hidden">
        <div className="h-full rounded-full" style={{ width: `${pct}%`, background: tint }} />
      </div>
    </div>
  );
}

function ClassroomModal({ module, onClose, host }) {
  const [messages, setMessages] = useState([
    { from: "system", text: host ? "You started the live class." : `Live class started by ${module.lecturer}.` },
  ]);
  const [draft, setDraft] = useState("");
  const [micOn, setMicOn] = useState(host);
  const [camOn, setCamOn] = useState(host);

  const send = () => {
    if (!draft.trim()) return;
    setMessages((m) => [...m, { from: "me", text: draft.trim() }]);
    setDraft("");
  };

  return (
    <div className="fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-4">
      <div className="bg-[#0B2545] rounded-2xl w-full max-w-4xl overflow-hidden shadow-2xl">

            <p className="text-white font-semibold text-sm">{module.title}</p>

              {module.lecturer} · {module.schedule} {host && <span className="text-[#C9A227]">· You are hosting</span>}
            </p>
          </div>
          <button onClick={onClose} className="text-white/70 hover:text-white p-1.5 rounded-lg hover:bg-white/10">
            <X size={18} />
          </button>
        </div>

        <div className="grid grid-cols-1 md:grid-cols-3">
          <div className="md:col-span-2 p-4">
            <div className="aspect-video rounded-xl bg-[#12315B] flex flex-col items-center justify-center gap-2 relative">
              {camOn ? (
                <div className="text-[#C9A227] flex flex-col items-center gap-2">
                  <Camera size={40} />
                  <p className="text-xs text-white/70">Your camera preview</p>
                </div>
              ) : (
                <div className="w-20 h-20 rounded-full bg-[#1B4374] flex items-center justify-center text-[#C9A227] font-serif text-2xl">
                  {initials(module.lecturer)}

                <span className="w-1.5 h-1.5 rounded-full bg-white animate-pulse" /> LIVE
              </span>
            </div>
            <div className="flex items-center justify-center gap-3 mt-4">

                {micOn ? <Mic size={18} /> : <MicOff size={18} />}

function AnnouncementsBoard({ items, setItems, canManage, authorName }) {
  const [composing, setComposing] = useState(false);
  const [title, setTitle] = useState("");
  const [body, setBody] = useState("");

  const post = () => {
    if (!title.trim() || !body.trim()) return;
    setItems((list) => [
      { id: Date.now(), title: title.trim(), body: body.trim(), date: "Today", author: authorName },
      ...list,
    ]);
    setTitle("");
    setBody("");
    setComposing(false);

  const remove = (id) => setItems((list) => list.filter((a) => a.id !== id));

  return (
    <div className="space-y-4">

        <div className="bg-white rounded-xl border border-slate-200 p-5">

                rows={3}
                className="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-[#C9A227]"
              />
              <div className="flex gap-2">
                <button onClick={() => setComposing(false)} className="text-sm font-semibold px-4 py-2 rounded-lg border border-slate-300 text-slate-600">Cancel</button>

function Fees({ programme, balance, setBalance }) {
  const [payOpen, setPayOpen] = useState(false);
  const [amount, setAmount] = useState("");
  const [receipt, setReceipt] = useState(null);

  const tuition = programme.fee;
  const registration = programme.reg;
  const admin = programme.admin || 0;
  const generalTotal = GENERAL_FEES.reduce((s, f) => s + f.amount, 0);
  const total = tuition + registration + admin + generalTotal;
  const paid = total - balance;

  const pay = () => {
    const val = Number(amount);
    if (!val || val <= 0) return;
    const applied = Math.min(val, balance);
    setBalance((b) => Math.max(0, b - val));
    setReceipt({ amount: applied, ref: `MIM-${Math.floor(100000 + Math.random() * 900000)}` });
    setAmount("");
  };

  return (
    <div className="space-y-6">
      <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">

        <div className="bg-white rounded-xl border border-slate-200 p-5">
          <p className="text-xs text-slate-500">Outstanding balance</p>

                <input value={amount} onChange={(e) => setAmount(e.target.value)} placeholder="1000" inputMode="numeric" className="mt-1.5 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-[#C9A227]" />
                <div className="flex gap-2 mt-4">
                  <button onClick={() => setPayOpen(false)} className="flex-1 text-sm font-semibold py-2 rounded-lg border border-slate-300 text-slate-600">Cancel</button>
                  <button onClick={pay} className="flex-1 text-sm font-semibold py-2 rounded-lg text-white" style={{ background: "#E8792C" }}>Pay now</button>
                </div>
              </>
            ) : (
              <>
                <div className="w-12 h-12 rounded-full bg-emerald-50 text-emerald-600 flex items-center justify-center mx-auto mb-3">
                  <CheckCircle2 size={24} />
                </div>
                <h3 className="font-serif text-lg text-[#0B2545] text-center mb-1">Payment received</h3>
                <p className="text-sm text-slate-500 text-center mb-4">{kwacha(receipt.amount)} · Ref {receipt.ref}</p>
                <button onClick={() => { setPayOpen(false); setReceipt(null); }} className="w-full text-sm font-semibold py-2 rounded-lg text-white" style={{ background: "#0B2545" }}>Done</button>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}
